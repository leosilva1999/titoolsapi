name: Deploy API

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build .NET
        run: dotnet publish -c Release -o publish

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build imagem
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/titoolsbackend:latest .

      - name: Push imagem
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/titoolsbackend:latest

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
            role-to-assume:  arn:aws:iam::172977038820:role/github-actions-leosilva1999-pipeline
            aws-region: sa-east-1
            
      - name: Atualizar ECS
        run: |
            aws ecs update-service \
              --cluster titools-cluster \
              --service titools-api-service \
              --force-new-deployment